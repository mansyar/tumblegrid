<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="marble" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#66F0FF"/>
      <stop offset="60%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0099B3"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tileTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E0D8"/>
      <stop offset="100%" stop-color="#C0B8B0"/>
    </linearGradient>
    <linearGradient id="tileLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A09890"/>
      <stop offset="100%" stop-color="#B8B0A8"/>
    </linearGradient>
    <linearGradient id="tileRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B8B0A8"/>
      <stop offset="100%" stop-color="#A09890"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="4" fill="#1A1A1A"/>
  <!-- Grid tile: left face -->
  <polygon points="16,22 10,18.5 16,15 22,18.5" fill="url(#tileTop)"/>
  <!-- Grid tile: left face -->
  <polygon points="10,18.5 10,21 16,24.5 16,22" fill="url(#tileLeft)"/>
  <!-- Grid tile: right face -->
  <polygon points="16,22 16,24.5 22,21 22,18.5" fill="url(#tileRight)"/>
  <!-- Marble glow -->
  <circle cx="16" cy="11.5" r="7" fill="url(#glow)"/>
  <!-- Marble -->
  <circle cx="16" cy="11.5" r="4.2" fill="url(#marble)"/>
  <!-- Marble highlight -->
  <ellipse cx="14.5" cy="10" rx="1.5" ry="1" fill="white" opacity="0.35"/>
</svg>
