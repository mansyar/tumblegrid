server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Compression ──────────────────────────────────────────────────
    gzip            on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml;

    # ── SPA fallback — all routes serve index.html ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache hashed assets (content-hash filenames from Vite) ──────
    location ~* \.(?:css|js|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:jpg|jpeg|png|gif|ico|webp|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
